<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SportsFinder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <h2>⚽ SportsFinder</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="index.html#how-it-works">How It Works</a>
      <a href="index.html#sports">Sports</a>
      <a href="register.html" class="btn-register">Sign Up</a>
    </div>
  </nav>

  <!-- Login Container -->
  <div class="auth-container">
    <div class="auth-box">
      <h2>Welcome Back!</h2>
      <p class="subtitle">Sign in to continue to SportsFinder</p>
      
      <form action="/login" method="POST">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <input type="checkbox" id="remember" name="remember">
          <label for="remember" style="display: inline; margin-left: 5px;">Remember me</label>
        </div>

        <button type="submit" class="btn-submit">Sign In</button>
      </form>

      <p class="auth-link">
        <a href="#">Forgot password?</a>
      </p>

      <div style="border-top: 1px solid var(--border-color); margin-top: 20px; padding-top: 20px; text-align: center;">
        <p style="color: var(--text-light); margin-bottom: 15px;">Don't have an account?</p>
        <a href="register.html" class="btn-primary" style="display: inline-block; padding: 10px 20px; text-decoration: none;">Create Account</a>
      </div>
    </div>
  </div>
</body>
</html>
