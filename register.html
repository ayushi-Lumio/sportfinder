<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register - SportsFinder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav>
    <h2>⚽ SportsFinder</h2>
    <div>
      <a href="index.html">Home</a>
      <a href="index.html#how-it-works">How It Works</a>
      <a href="index.html#sports">Sports</a>
      <a href="login.html" class="btn-login">Login</a>
    </div>
  </nav>

  <!-- Register Container -->
  <div class="auth-container">
    <div class="auth-box">
      <h2>Join SportsFinder</h2>
      <p class="subtitle">Create your account to find sports partners</p>
      
      <form action="/register" method="POST">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" name="name" placeholder="John Doe" required>
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" name="phone" placeholder="+91 9876543210" required>
        </div>

        <div class="form-group">
          <label for="city">City</label>
          <input type="text" id="city" name="city" placeholder="Delhi" required>
        </div>

        <div class="form-group">
          <label for="sport">Favorite Sport</label>
          <select id="sport" name="sport" required>
            <option value="">Select a sport</option>
            <option value="cricket">Cricket</option>
            <option value="badminton">Badminton</option>
            <option value="football">Football</option>
            <option value="basketball">Basketball</option>
            <option value="tennis">Tennis</option>
            <option value="table-tennis">Table Tennis</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="skill">Skill Level</label>
          <select id="skill" name="skill" required>
            <option value="">Select skill level</option>
            <option value="beginner">Beginner</option>
            <option value="intermediate">Intermediate</option>
            <option value="advanced">Advanced</option>
            <option value="professional">Professional</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required>
        </div>

        <div class="form-group">
          <input type="checkbox" id="terms" name="terms" required>
          <label for="terms" style="display: inline; margin-left: 5px;">I agree to the Terms & Conditions</label>
        </div>

        <button type="submit" class="btn-submit">Create Account</button>
      </form>

      <p class="auth-link" style="margin-top: 20px;">
        Already have an account? <a href="login.html">Sign In</a>
      </p>
    </div>
  </div>
</body>
</html>
